    <title>邂逅</title>
    <style>
        :root {
            /* 暖玫瑰灰与柔白底色系 */
            --bg-base: #f7f5f6;
            --glass-bg: rgba(250, 248, 249, 0.65);
            --glass-border: rgba(220, 210, 214, 0.4);
            --glass-shadow: 0 8px 32px rgba(160, 145, 150, 0.08);
            
            /* 墨色文本与点缀 */
            --text-main: #2a2829;
            --text-sub: #8c8386;
            --accent-color: #cbbabc; /* 莫兰迪玫瑰灰 */
            --accent-light: #e6dcdf;
            
            --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background-color: #000; /* 外围纯黑 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        /* 模拟移动端容器 */
        .app-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            height: 100dvh;
            background-color: var(--bg-base);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 玻璃拟物顶栏 */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            padding: 65px 0 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(120%);
            -webkit-backdrop-filter: blur(25px) saturate(120%);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        .header h1 {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 2px;
            color: var(--text-main);
        }

        /* 核心内容区 */
        .content-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-top: 100px;
            padding-bottom: 100px;
            scroll-behavior: smooth;
        }

        /* 隐藏滚动条 */
        .content-area::-webkit-scrollbar { display: none; }

        .tab-view {
            display: none;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 玻璃拟物底栏 */
        .nav-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 84px;
            padding-bottom: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(120%);
            -webkit-backdrop-filter: blur(25px) saturate(120%);
            border-top: 1px solid var(--glass-border);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text-sub);
            transition: color 0.3s ease;
        }

        .nav-item.active {
            color: var(--text-main);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.3s ease;
        }

        .nav-item.active .nav-icon {
            transform: scale(1.1);
            stroke-width: 2;
        }

        .nav-text {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* ----- 发现页面 (Discovery) ----- */
        .discovery-container {
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .card-stack {
            flex: 1;
            position: relative;
            border-radius: var(--radius-lg);
            background: #e8e3e4; /* 占位背景色 */
            overflow: hidden;
            box-shadow: var(--glass-shadow);
        }

        .card-image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #eeeaeb 0%, #dfd8da 100%);
            position: absolute;
        }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px 24px 24px;
            background: linear-gradient(to top, rgba(20,18,19,0.5) 0%, transparent 100%);
            color: #fff;
        }

        .card-title {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .card-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .card-tag {
            padding: 4px 12px;
            border-radius: 100px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 12px;
            font-weight: 300;
        }

        .card-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .action-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            box-shadow: var(--glass-shadow);
        }

        .action-btn svg {
            width: 24px;
            height: 24px;
        }

        /* ----- 动态页面 (Moments) ----- */
        .moments-container {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .moment-card {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--glass-shadow);
        }

        .moment-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .moment-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent-light);
        }

        .moment-user {
            flex: 1;
        }

        .moment-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
        }

        .moment-time {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        .moment-content {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-main);
            font-weight: 300;
            margin-bottom: 16px;
        }

        .moment-image-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .moment-img-placeholder {
            width: 100%;
            aspect-ratio: 1;
            background: #e6e2e3;
            border-radius: var(--radius-sm);
        }

        .moment-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(200, 190, 195, 0.3);
            padding-top: 16px;
        }

        .m-action {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-sub);
            font-size: 13px;
        }

        .m-action svg {
            width: 18px;
            height: 18px;
        }

        /* ----- 私信页面 (Messages) ----- */
        .messages-container {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            border-radius: var(--radius-md);
            background: transparent;
            transition: background 0.2s ease;
        }

        .message-item:active {
            background: rgba(200, 190, 195, 0.2);
        }

        .msg-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--accent-light);
            position: relative;
        }

        .msg-dot {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
            border: 2px solid var(--bg-base);
        }

        .msg-content {
            flex: 1;
            overflow: hidden;
        }

        .msg-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .msg-name {
            font-size: 16px;
            font-weight: 500;
        }

        .msg-time {
            font-size: 12px;
            color: var(--text-sub);
        }

        .msg-preview {
            font-size: 13px;
            color: var(--text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 300;
        }

        /* ----- 个人页面 (Profile) ----- */
        .profile-container {
            display: flex;
            flex-direction: column;
        }

        .profile-cover {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #dfd8da 0%, #d5cbd0 100%);
            position: relative;
        }

        .profile-actions-top {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
        }

        .icon-btn-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .profile-info-section {
            padding: 0 24px 24px;
            position: relative;
            background: var(--bg-base);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--text-sub);
            border: 4px solid var(--bg-base);
            margin-top: -40px;
            margin-bottom: 12px;
            position: relative;
            z-index: 2;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .profile-id {
            font-size: 12px;
            color: var(--text-sub);
            font-weight: 300;
            margin-bottom: 16px;
        }

        .profile-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .p-tag {
            padding: 6px 14px;
            border-radius: 100px;
            background: rgba(200, 190, 195, 0.2);
            color: var(--text-sub);
            font-size: 12px;
            font-weight: 300;
        }

        .profile-stats {
            display: flex;
            gap: 32px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(200, 190, 195, 0.3);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-num {
            font-size: 18px;
            font-weight: 600;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-sub);
            font-weight: 300;
        }

        .profile-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
        }

        .menu-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 300;
        }

    </style>
